<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moja Kolekcja Nakrętek Tarczyn</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; color: #333; margin: 20px; }
        max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #d32f2f; text-align: center; }
        
        /* Statystyki */
        .stats { background: #e8f5e9; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
        .progress-bar { background: #ddd; border-radius: 20px; height: 20px; width: 100%; margin-top: 10px; }
        .progress-fill { background: #4caf50; height: 100%; width: 0%; border-radius: 20px; transition: width 0.5s; }

        /* Wyszukiwarka */
        #searchInput { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }

        /* Tabela */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #d32f2f; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        tr:hover { background-color: #f1f1f1; }
        .num-col { width: 50px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>🥤 Kolekcja Nakrętek Tarczyn</h1>

    <div class="stats">
        Dodano: <span id="count">0</span> / 300 nakrętek
        <div class="progress-bar">
            <div id="progressFill" class="progress-fill"></div>
        </div>
    </div>

    <input type="text" id="searchInput" onkeyup="searchTable()" placeholder="Szukaj ciekawostki lub numeru...">

    <table id="capTable">
        <thead>
            <tr>
                <th class="num-col">Nr</th>
                <th>Ciekawostka spod nakrętki</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <tr><td class="num-col">1</td><td>Tu wpisz pierwszą ciekawostkę</td></tr>
            <tr><td class="num-col">2</td><td>A tutaj drugą...</td></tr>
            <tr><td class="num-col">3</td><td>Pamiętaj, by dodawać kolejne wiersze (tr)</td></tr>
        </tbody>
    </table>
</div>

<script>
    function updateStats() {
        const rows = document.getElementById("tableBody").getElementsByTagName("tr").length;
        document.getElementById("count").innerText = rows;
        const percent = (rows / 300) * 100;
        document.getElementById("progressFill").style.width = percent + "%";
    }

    function searchTable() {
        var input, filter, table, tr, td, i, txtValue;
        input = document.getElementById("searchInput");
        filter = input.value.toUpperCase();
        table = document.getElementById("capTable");
        tr = table.getElementsByTagName("tr");

        for (i = 1; i < tr.length; i++) {
            td = tr[i].getElementsByTagName("td");
            if (td) {
                let match = false;
                if (td[0].innerHTML.toUpperCase().indexOf(filter) > -1 || 
                    td[1].innerHTML.toUpperCase().indexOf(filter) > -1) {
                    match = true;
                }
                tr[i].style.display = match ? "" : "none";
            }
        }
    }

    // Inicjalizacja licznika na starcie
    updateStats();
</script>

</body>
</html>
