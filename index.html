<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kolekcja Tarczyn - Postęp</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 10px; text-align: center; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h1 { color: #d32f2f; margin-bottom: 5px; font-size: 1.5rem; }
        
        .stats { background: #fff3e0; padding: 10px; border-radius: 8px; font-weight: bold; margin-bottom: 15px; }

        /* Siatka nakrętek */
        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(50, 1fr); 
            gap: 1px; 
            background: #ccc; 
            padding: 2px; 
            margin-bottom: 20px;
        }
        .cap { 
            aspect-ratio: 1/1; background: #fff; border: none; 
            font-size: 7px; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; transition: 0.2s;
        }
        .cap.collected { background: #4caf50; color: white; font-weight: bold; }
        
        /* Wyszukiwarka */
        #searchInput { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 5px; }

        /* Tabela */
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
        th, td { padding: 10px; border: 1px solid #eee; }
        th { background: #d32f2f; color: white; }
        .num-col { width: 40px; text-align: center; font-weight: bold; }
        .city-col { width: 120px; color: #d32f2f; font-weight: bold; }

        @media (max-width: 800px) {
            .grid-container { grid-template-columns: repeat(25, 1fr); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🥤 Kolekcja Nakrętek Tarczyn</h1>
    
    <div class="stats">Postęp: <span id="count">0</span> / 300</div>
    
    <div id="capGrid" class="grid-container"></div>

    <input type="text" id="searchInput" onkeyup="searchTable()" placeholder="Szukaj po numerze, mieście lub treści...">

    <div class="table-wrapper">
        <table id="capTable">
            <thead>
                <tr>
                    <th class="num-col">Nr</th>
                    <th class="city-col">Miasto</th>
                    <th>Ciekawostka</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr>
                    <td class="num-col">12</td>
                    <td class="city-col">Warszawa</td>
                    <td>Pszczoły potrafią rozpoznawać ludzkie twarze.</td>
                </tr>
                <tr>
                    <td class="num-col">54</td>
                    <td class="city-col">Kraków</td>
                    <td>Wawelski smok podobno naprawdę istniał w legendach od XII wieku.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const totalCaps = 300;
    const grid = document.getElementById('capGrid');
    const countDisplay = document.getElementById('count');

    // Funkcja ładująca zaznaczone nakrętki z pamięci przeglądarki
    let collectedData = JSON.parse(localStorage.getItem('tarczyn_collected')) || [];

    for (let i = 1; i <= totalCaps; i++) {
        const cap = document.createElement('div');
        cap.classList.add('cap');
        if (collectedData.includes(i)) cap.classList.add('collected');
        cap.innerText = i;
        cap.onclick = function() {
            this.classList.toggle('collected');
            toggleCollected(i);
        };
        grid.appendChild(cap);
    }

    function toggleCollected(id) {
        if (collectedData.includes(id)) {
            collectedData = collectedData.filter(item => item !== id);
        } else {
            collectedData.push(id);
        }
        localStorage.setItem('tarczyn_collected', JSON.stringify(collectedData));
        updateCount();
    }

    function updateCount() {
        const collected = document.querySelectorAll('.cap.collected').length;
        countDisplay.innerText = collected;
    }

    function searchTable() {
        let input = document.getElementById("searchInput").value.toUpperCase();
        let rows = document.getElementById("tableBody").getElementsByTagName("tr");

        for (let i = 0; i < rows.length; i++) {
            let text = rows[i].textContent.toUpperCase();
            rows[i].style.display = text.includes(input) ? "" : "none";
        }
    }

    updateCount();
</script>

</body>
</html>
